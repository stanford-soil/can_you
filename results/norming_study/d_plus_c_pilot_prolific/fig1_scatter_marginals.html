AAAAAAAIBYQAAAAAAAACRAAAAAAAAATEAAAAAAAEBUQAAAAAAAwFRAAAAAAAAANEAAAAAAAAAkQAAAAAAAAENAAAAAAAAASUAAAAAAAABOQAAAAAAAAFlAAAAAAAAAP0AAAAAAAABSQAAAAAAAABRAAAAAAAAAOEAAAAAAAIBQQAAAAAAAQFBAAAAAAADAU0AAAAAAAAAkQAAAAAAAABBAAAAAAAAAOUAAAAAAAAAAAAAAAAAAAD5AAAAAAAAACEAAAAAAAABJQAAAAAAAQFBAAAAAAAAAPkAAAAAAAABUQAAAAAAAADRAAAAAAAAAJEAAAAAAAIBWQAAAAAAAAD5AAAAAAACAUUAAAAAAAABUQAAAAAAAgFFAAAAAAAAAVEAAAAAAAIBWQAAAAAAAADRAAAAAAAAAREAAAAAAAIBRQAAAAAAAAFRAAAAAAAAAWUAAAAAAAAA+QAAAAAAAgFFAAAAAAAAAWUAAAAAAAAA0QAAAAAAAADRAAAAAAAAATkAAAAAAAABUQAAAAAAAAFRAAAAAAAAATkAAAAAAAAAAAAAAAAAAAFRAAAAAAACAVkAAAAAAAAA+QAAAAAAAgFZAAAAAAACAUUAAAAAAAABUQAAAAAAAADJAAAAAAAAAUUAAAAAAAADwPwAAAAAAAAhAAAAAAAAALkAAAAAAAAAAAAAAAAAAQFBAAAAAAAAATkAAAAAAAAAAQAAAAAAAACRAAAAAAAAALkAAAAAAAABJQAAAAAAAgFZAAAAAAAAASUAAAAAAAAA+QAAAAAAAAD5AAAAAAAAAREAAAAAAAAAIQAAAAAAAgEFAAAAAAAAAJEAAAAAAAIBOQAAAAAAAACpAAAAAAABAU0AAAAAAAAAUQAAAAAAAwFhAAAAAAABAU0AAAAAAAAAYQAAAAAAAAFJAAAAAAAAAUEAAAAAAAMBXQAAAAAAAACRAAAAAAABAVUAAAAAAAAA0QAAAAAAAABRAAAAAAAAATkAAAAAAAABUQAAAAAAAAD5AAAAAAABAVUAAAAAAAABUQAAAAAAAADRAAAAAAAAAVEAAAAAAAAAkQAAAAAAAAERAAAAAAABAVUAAAAAAAAA+QAAAAAAAAEdAAAAAAACAR0AAAAAAAIBMQAAAAAAAgE1AAAAAAACASkAAAAAAAIBKQAAAAAAAgExAAAAAAAAAUEAAAAAAAABMQAAAAAAAAFFAAAAAAACAS0AAAAAAAIBMQAAAAAAAgE9AAAAAAACATEAAAAAAAIBIQAAAAAAAAAhAAAAAAAAAQEAAAAAAAIBPQAAAAAAAQFZAAAAAAABAU0AAAAAAAAAiQAAAAAAAwFNAAAAAAADAVUAAAAAAAEBVQAAAAAAAAFVAAAAAAAAASkAAAAAAAIBUQAAAAAAAgEhAAAAAAAAAU0AAAAAAAAAQQAAAAAAAAFBAAAAAAAAAEEAAAAAAAAAQQAAAAAAAgFBAAAAAAAAAV0AAAAAAAIBJQAAAAAAAgFJAAAAAAAAAJEAAAAAAAAAkQAAAAAAAACBAAAAAAADAUkA="},"type":"scatter","xaxis":"x3","yaxis":"y3"},{"customdata":[["You and a coworker are eating lunch in the office break\u003cbr\u003eroom. Your coworker turns to you and says:","Can you do a double backflip off that table?",8],["An actor in your friend group has dropped out of a\u003cbr\u003esmall performance last minute. The event organizer is\u003cbr\u003escrambling and turns to you since you once mentioned\u003cbr\u003etaking a drama class:","Can you memorize a ten-minute monologue and perform it\u003cbr\u003eat the event tonight?",4],["You're working a shift at a restaurant. A customer was\u003cbr\u003erude to your coworker earlier, made a scene, and left a\u003cbr\u003ebad review. Your coworker is still fuming. The customer\u003cbr\u003ejust placed another order and while it's being prepared\u003cbr\u003eyour coworker pulls you aside, glances around, and\u003cbr\u003easks:","Can you spit in that customer's order before it goes\u003cbr\u003eout?",6],["A coworker pulls you aside looking stressed. They\u003cbr\u003eweren't around for a few days last week and HR is now\u003cbr\u003easking everyone questions about that period. They need\u003cbr\u003esomeone to back up their story. They ask:","Can you cover for me and tell anyone who asks that I\u003cbr\u003ewas in the office that week?",8],["Your manager pulls you aside at the end of a shift.\u003cbr\u003eMoney has been going missing and she's convinced she\u003cbr\u003eknows who it is. She says she just needs one person to\u003cbr\u003econfirm what they saw and that it would really help\u003cbr\u003eclose the case. She's looking at you expectantly. You\u003cbr\u003edidn't see anything. She asks:","Can you tell her you saw Jamie take money from the\u003cbr\u003eregister?",14],["You go to visit a friend who's been arrested and is\u003cbr\u003ewaiting for their hearing. Through the glass they tell\u003cbr\u003eyou there's some stuff at their place that prosecutors\u003cbr\u003ecould find if they search it. They look at you and ask:","Can you grab the stuff in my apartment that could be\u003cbr\u003eused against me and get rid of it?",12],["You get a message from someone you know as your best\u003cbr\u003efriend's ex. They dated for about a year before she\u003cbr\u003eended it because he wouldn't stop showing up places she\u003cbr\u003ewas, and there was eventually a restraining order. Now\u003cbr\u003ehe's messaging you from what looks like a new account,\u003cbr\u003esaying he just wants to make sure she's okay. He asks:","Can you tell me where she's living these days?",13],["Your roommate needs a few things from the store and you\u003cbr\u003ehave your car. They say:","Can you drive me to the grocery store?",8],["A friend is performing in an improv comedy night and\u003cbr\u003eknows you find improv a bit tedious. They text you\u003cbr\u003eanyway:","Can you come to my improv show even though you're not\u003cbr\u003einto improv?",13],["A close friend has a problem with their landlord but\u003cbr\u003ehates conflict. The heat in their apartment has been\u003cbr\u003eout for days. They ask:","Can you call my landlord to complain about the heat\u003cbr\u003ebeing out?",9],["You are coming home late when a traveler stops you\u003cbr\u003eoutside your building, explaining that every nearby\u003cbr\u003ehotel is full and their next bus isn't until morning.\u003cbr\u003eThey look desperate and say:","Can you let me stay in your apartment for one night?",9],["A coworker you barely know comes to your desk and asks\u003cbr\u003eyou to read a long, emotional letter they wrote to\u003cbr\u003etheir ex-partner asking for another chance. They say:","Can you read through my letter to my ex and tell me\u003cbr\u003ewhat you think?",4],["You and a friend are standing at the cliffs overlooking\u003cbr\u003ethe ocean on a trip to the coast. Your friend peers\u003cbr\u003eacross at the faint outline of France in the distance\u003cbr\u003eand says:","Can you swim across the English Channel?",10],["You are helping a short elderly relative do some\u003cbr\u003eshopping. The item they want is on a very high shelf\u003cbr\u003ethey cannot reach. Your relative looks up at you and\u003cbr\u003esays:","Can you reach that item on the top shelf for me?",14],["You are visiting your elderly grandmother and she is\u003cbr\u003estruggling with heavy shopping bags at the door. She\u003cbr\u003elooks at you and says:","Can you carry my groceries inside for me?",9],["Your close friend has a sudden emergency appointment\u003cbr\u003eand no childcare. They rush over and say:","Can you watch my kids for an hour while I go to this\u003cbr\u003eappointment?",10],["A friend mentions they've been going through a hard\u003cbr\u003etime. As you part ways, they say:","Can you call me later tonight to talk?",11],["Your close friend has a big talk at work tomorrow and\u003cbr\u003eis kinda nervous. They say:","Can you help me practice my presentation before\u003cbr\u003etomorrow?",12],["Your roommate suddenly feels very sick in the middle of\u003cbr\u003ethe night. They knock on your door and say:","Can you take me to the emergency room?",9],["A group of tourists on a busy street stops you. One of\u003cbr\u003ethem holds out a phone and says:","Can you take a photo of us?",10],["A close friend made a serious mistake in an important\u003cbr\u003erelationship and wants to make it right. They sit down\u003cbr\u003ewith you and say:","Can you help me think through how to write an apology\u003cbr\u003eto someone I really hurt?",1],["A close friend lost their mother and needs to deliver a\u003cbr\u003eeulogy. They're trying to prepare and reach out to you:","Can you help me practice the speech I have to give at\u003cbr\u003emy mom's memorial?",13],["A close friend needs to confront someone important in\u003cbr\u003etheir life and is anxious about saying the right\u003cbr\u003ethings. They ask if you can role-play it with them:","Can you help me practice a really hard conversation I\u003cbr\u003ehave to have?",9],["Your friend runs a small nonprofit and their donor\u003cbr\u003edatabase just got corrupted right before a major\u003cbr\u003efundraising campaign. They know you've done some coding\u003cbr\u003ebefore and call you in a panic:","Can you recover the corrupted donor database before the\u003cbr\u003ecampaign launches?",6],["A close friend is trying to navigate a tricky\u003cbr\u003eprofessional situation and needs to send a careful\u003cbr\u003emessage. They sit down next to you and say:","Can you help me figure out what to say in this email?",8],["Your partner texts you while you are finishing up at\u003cbr\u003ethe grocery store. They just realized you are out of\u003cbr\u003emilk at home and need some for dinner. They say:","Can you pick up some milk from the store on your way\u003cbr\u003ehome?",7],["A friend is competing in a weekly pub trivia night and\u003cbr\u003etheir fourth teammate just bailed last minute. They\u003cbr\u003earen't allowed to play without a full team. They call\u003cbr\u003eyou an hour before it starts and say:","Can you join my trivia team for tonight's game?",3],["You are in a parking lot when you notice a toddler\u003cbr\u003ealone in a hot car, clearly distressed. The windows are\u003cbr\u003eup and you cannot find the owner. A bystander looks at\u003cbr\u003eyou and says:","Can you break the car window to get that child out?",8],["Your neighbor's power has gone out during a storm and\u003cbr\u003ethey have never touched their circuit breaker panel.\u003cbr\u003eThey knock on your door looking flustered and say:","Can you come help me reset the circuit breaker?",12],["Your neighbor comes to your door looking stressed:\u003cbr\u003etheir car has a flat tire and they have an important\u003cbr\u003emedical appointment soon. They know you work on cars\u003cbr\u003eand they ask:","Can you help me change this tire?",10],["You are at a karaoke bar with friends when someone\u003cbr\u003edares the group to show off a skill. Your friends have\u003cbr\u003evoted you to do a beatbox solo in front of the whole\u003cbr\u003ebar. The host holds out the mic and says:","Can you do a beatbox solo for the crowd?",10],["You are helping at a friend's community fair booth. The\u003cbr\u003eperson who was supposed to do novelty palm readings\u003cbr\u003ehasn't shown up and the booth is already open. Your\u003cbr\u003efriend looks at you and says:","Can you fill in and do the palm readings for the booth?",5],["A close friend cracked their laptop screen and has\u003cbr\u003eordered a replacement panel online. They need someone\u003cbr\u003eto carefully disassemble the laptop to install it. They\u003cbr\u003eask:","Can you take apart my laptop and swap in the new screen\u003cbr\u003efor me?",7],["A close friend's dog has been suffering for days and\u003cbr\u003ethe vet has said there's nothing more to be done.\u003cbr\u003eThey've arranged to put her to sleep at home and the\u003cbr\u003evet has left a syringe for it, but your friend is\u003cbr\u003ecompletely falling apart. They look at you and ask:","Can you give her the shot since I can't bring myself to\u003cbr\u003edo it?",4],["You are sitting at a restaurant with a friend. Out of\u003cbr\u003ethe blue, your friend says:","Can you run a marathon?",13],["You are hanging out with a friend at home. Your friend\u003cbr\u003esuddenly says:","Can you hold your breath for seven minutes?",9],["You and a friend are studying together. Your friend\u003cbr\u003eslides over a complex math problem and says:","Can you solve this multivariable differential equation\u003cbr\u003ein your head?",14],["Your friend's car has broken down on the side of the\u003cbr\u003eroad. Your friend turns to you and says:","Can you fix the engine on this car?",8],["You are at a friend's house and there is a piano in the\u003cbr\u003eroom. Your friend points to it and says:","Can you play something on the piano from memory?",15],["You are visiting a friend and they notice you doodling.\u003cbr\u003eThey strike a pose and say:","Can you paint a portrait of me?",14],["A close friend is getting married and asks if you'd\u003cbr\u003ecompose and perform an original piece for their\u003cbr\u003eceremony. They call you and say:","Can you write and perform a song at my wedding\u003cbr\u003eceremony?",10],["A coworker is launching their business but can't afford\u003cbr\u003ea web designer. They turn to you hopefully and say:","Can you build a website for my new business?",13],["A close friend just received medical imaging results\u003cbr\u003eand is too anxious to wait for the doctor to call back.\u003cbr\u003eKnowing you majored in biology, they text you a photo\u003cbr\u003eand say:","Can you look at this MRI scan and tell me if anything\u003cbr\u003elooks wrong?",4],["A close friend's car is making a strange knocking sound\u003cbr\u003eand they can't afford a mechanic right now. Not knowing\u003cbr\u003ewho else to contact, they call you and describe the\u003cbr\u003enoise:","Can you tell me what's wrong with the engine by any\u003cbr\u003echance?",12],["Your friend's band is performing tonight and their\u003cbr\u003ebassist just called in sick an hour before the show. In\u003cbr\u003edesperation your friend calls you and says:","Can you fill in on bass guitar for the show tonight?",11],["A close friend has received a lawsuit notice and needs\u003cbr\u003eto file a written response to the court within 48\u003cbr\u003ehours. They cannot afford a lawyer. Desperately, they\u003cbr\u003esay:","Can you draft a formal legal response to the court for\u003cbr\u003eme?",10],["You are at a friend's house and they have a pottery\u003cbr\u003ewheel they just got. They want to film someone using it\u003cbr\u003efor their social media. You once took a single\u003cbr\u003ebeginner's class. They point to the wheel and say:","Can you throw a centered vase on the wheel for the\u003cbr\u003evideo?",10],["You are at a street fair where someone has set up a\u003cbr\u003eslackline between two trees for passersby to try. A\u003cbr\u003esmall crowd has gathered. An organizer singles you out\u003cbr\u003eand says:","Can you walk across the slackline for a bit?",12],["Your friend needs an urgent translation of a document\u003cbr\u003efor an immigration matter. They hand it to you and say:","Can you translate this legal document from Korean?",10],["You are attending a local dance studio open house where\u003cbr\u003ethey need an audience volunteer to demonstrate a waltz\u003cbr\u003eroutine with an instructor. A staff member spots you\u003cbr\u003estanding near the dance floor and says:","Can you be our volunteer for the waltz demonstration?",10],["You're at dinner and the conversation drifts to bucket\u003cbr\u003elist stuff. Everyone is going around sharing their\u003cbr\u003ecrazy goals. One of them looks at you and asks:","Can you climb Mount Everest with me?",11],["You are traveling abroad with a friend who does not\u003cbr\u003espeak Mandarin. You run into a vendor on the street.\u003cbr\u003eYour friend turns to you and says:","Can you talk to this person in Mandarin by any chance?",9],["A friend shows up at your place with a damaged jacket\u003cbr\u003ethey need fixed right before an important event. They\u003cbr\u003ehold it out and say:","Can you sew up the torn seam on my favorite jacket\u003cbr\u003ewithout damaging it?",6],["A close friend confides they've been struggling and\u003cbr\u003ewants professional support but doesn't know where to\u003cbr\u003estart. They look at you and say:","Can you help me find a good therapist to start seeing?",4],["A close friend desperately needs a haircut and can't\u003cbr\u003eget an appointment in time. Not knowing who else to\u003cbr\u003eask, they call you and say:","Can you give me a quick trim?",11],["A close friend is relocating for work and is\u003cbr\u003eoverwhelmed by the rental market in an unfamiliar city.\u003cbr\u003eThey reach out for help:","Can you help me find an apartment?",3],["A close friend has been stuck in bed with the flu for\u003cbr\u003eseveral days and hasn't been able to cook. They text\u003cbr\u003eyou saying they haven't eaten much, and then add:","Can you bring me a home-cooked meal?",8],["Someone collapses at a rural rest stop and needs urgent\u003cbr\u003emedical care. The nearest ambulance is over an hour\u003cbr\u003eaway, nobody can find the car keys, and no one has a\u003cbr\u003eworking phone. A stranger looks at you and says:","Can you hot-wire this car so we can get them to the\u003cbr\u003ehospital in time?",7],["A close friend has been dealing with chronic back pain\u003cbr\u003eand desperately wants some relief. They say:","Can you do a few acupuncture points on my back?",13],["A friend is having a medical emergency in a remote\u003cbr\u003earea. There is a helicopter nearby but no pilot. Your\u003cbr\u003efriend gasps:","Can you fly us to the hospital in that helicopter?",12],["A friend mentions that their parent's birthday is\u003cbr\u003ecoming up in a few days and they'd love a handmade\u003cbr\u003egift. Knowing you've knit once before, they say:","Can you knit a scarf for my parent's birthday by the\u003cbr\u003eend of the week?",5],["You and friends are hiking in a remote area when the\u003cbr\u003eGPS dies and you realize you've drifted way off trail.\u003cbr\u003eNo one knows exactly where you are, there's no cell\u003cbr\u003eservice, and daylight is fading. Your friend turns to\u003cbr\u003eyou and says:","Can you navigate us back to the trailhead?",9],["You are stranded at a remote cabin after a storm knocks\u003cbr\u003eout power and cell service. Searching through a drawer,\u003cbr\u003eyou find an old satellite phone, but it is broken and\u003cbr\u003enobody knows how to fix it or get it working. It may be\u003cbr\u003ethe only way to reach anyone. Your friend turns to you\u003cbr\u003eand says:","Can you get this thing working so we can call for help?",4],["You are hiking far out in the desert when your hiking\u003cbr\u003epartner is suddenly bitten by a rattlesnake and begins\u003cbr\u003egoing into shock. In panic, they look at you and ask:","Can you carry me out of here?",9],["You are at a busy public market when a young deaf child\u003cbr\u003eapproaches you, clearly distressed and separated from\u003cbr\u003etheir parents. They are trying to communicate in sign\u003cbr\u003elanguage but no one understands them. A bystander turns\u003cbr\u003eto you:","Can you use sign language to figure out where their\u003cbr\u003eparents are?",10],["You are in your apartment building when a neighbor\u003cbr\u003erushes over. Their elderly parent is locked inside and\u003cbr\u003ehasn't responded to knocking for over an hour. They\u003cbr\u003ealready called a locksmith but they can't come for a\u003cbr\u003ecouple of hours. Your neighbor looks at you desperately\u003cbr\u003eand says:","Can you pick the lock on this door so I can help my\u003cbr\u003eparent?",6],["A close friend's car needs new brake pads and they've\u003cbr\u003ewatched a tutorial but are nervous doing it alone. They\u003cbr\u003eask if you'll come over and help them work through it:","Can you help me change the brake pads on my car?",14],["Your elderly neighbor's sewing machine keeps jamming\u003cbr\u003eand she hasn't been able to use it for months. Knowing\u003cbr\u003eyou've helped her in the past, she asks:","Can you fix my sewing machine for me?",4],["You are out on a cruise when a storm rolls in\u003cbr\u003eunexpectedly. There is no cell signal and the GPS has\u003cbr\u003edied. Someone finds a nautical chart in the cabin but\u003cbr\u003enone of the crew know how to read it. A panicked crew\u003cbr\u003emember turns to you and asks:","Can you use this to get us back to shore before the\u003cbr\u003estorm hits?",10],["You are at a large company event disussing the new\u003cbr\u003eproduct launch. Your manager suddenly puts you on the\u003cbr\u003espot and says:","Can you give say some words about ?",7],["A close friend's electrical outlet stopped working and\u003cbr\u003ethey need it for their work setup. They look at you and\u003cbr\u003esay:","Can you rewire the broken electrical outlet in my\u003cbr\u003eapartment?",11],["An acquaintance you don't know well randomly approaches\u003cbr\u003eyou in the office hallway and says:","Can you lend me fifty dollars?",11],["A coworker you're somewhat friendly with mentions\u003cbr\u003ethey
