 I\u003cbr\u003ehave to have?",0.0,20.0],["A close friend's electrical outlet stopped working and\u003cbr\u003ethey need it for their work setup. They look at you and\u003cbr\u003esay:","Can you rewire the broken electrical outlet in my\u003cbr\u003eapartment?",0.0,50.0],["Your upstairs neighbor, someone you've only met briefly\u003cbr\u003ea couple of times, knocks on your door in a rush and\u003cbr\u003esays they have an unexpected errand and need someone to\u003cbr\u003ewatch their two young children. They say:","Can you watch my kids for a couple hours while I'm out?",70.0,30.0],["A close friend's car is making a strange knocking sound\u003cbr\u003eand they can't afford a mechanic right now. Not knowing\u003cbr\u003ewho else to contact, they call you and describe the\u003cbr\u003enoise:","Can you tell me what's wrong with the engine by any\u003cbr\u003echance?",-40.0,0.0],["Your manager sends you a somewhat controversial\u003cbr\u003einternal memo and says:","Can you send this to the team and say it's from you?",-40.0,100.0],["A distant relative of yours calls you in a panic,\u003cbr\u003esaying the police are asking where they were last night\u003cbr\u003eand they need an alibi. Your relative says:","Can you tell the police you were with me last night\u003cbr\u003eeven though you weren't?",40.0,100.0],["A classmate missed an assignment deadline and wants you\u003cbr\u003eto back up a lie they already told the professor. They\u003cbr\u003emessage you right before class:","Can you tell the professor I submitted my paper on\u003cbr\u003etime?",40.0,100.0],["You get a message from someone you know as your best\u003cbr\u003efriend's ex. They dated for about a year before she\u003cbr\u003eended it because he wouldn't stop showing up places she\u003cbr\u003ewas, and there was eventually a restraining order. Now\u003cbr\u003ehe's messaging you from what looks like a new account,\u003cbr\u003esaying he just wants to make sure she's okay. He asks:","Can you tell me where she's living these days?",10.0,20.0],["A close friend has been dealing with chronic back pain\u003cbr\u003eand desperately wants some relief. They say:","Can you do a few acupuncture points on my back?",-40.0,0.0],["You are at a busy public market when a young deaf child\u003cbr\u003eapproaches you, clearly distressed and separated from\u003cbr\u003etheir parents. They are trying to communicate in sign\u003cbr\u003elanguage but no one understands them. The shopkeeper\u003cbr\u003eturns to you:","Can you use sign language to figure out where their\u003cbr\u003eparents are?",-30.0,0.0],["You and a friend are standing at the cliffs overlooking\u003cbr\u003ethe ocean on a trip to the coast. Your friend peers\u003cbr\u003eacross at the faint outline of France in the distance\u003cbr\u003eand says:","Can you swim across the English Channel?",-30.0,20.0],["You get a message from someone you vaguely knew in high\u003cbr\u003eschool. They explain they've been trying to get\u003cbr\u003eapproved for a small business loan and keep getting\u003cbr\u003erejected because of their credit. They've asked a few\u003cbr\u003epeople already. They end the message asking:","Can you help me cosign the loan?",10.0,60.0],["You are sitting at a restaurant with a friend. Out of\u003cbr\u003ethe blue, your friend says:","Can you run a marathon?",10.0,40.0],["A friend mentions they've been going through a hard\u003cbr\u003etime. As you part ways, they say:","Can you call me later tonight to talk?",-40.0,100.0],["A close friend is getting married and asks if you'd\u003cbr\u003ecompose and perform an original piece for their\u003cbr\u003eceremony. They call you and say:","Can you write and perform a song at my wedding\u003cbr\u003eceremony?",-10.0,50.0],["You are attending a local dance studio open house where\u003cbr\u003ethey need an audience volunteer to demonstrate a waltz\u003cbr\u003eroutine with an instructor. A staff member spots you\u003cbr\u003estanding near the dance floor and says:","Can you be our volunteer for the waltz demonstration?",-30.0,40.0],["You are at a street fair where someone has set up a\u003cbr\u003eslackline between two trees for passersby to try. A\u003cbr\u003esmall crowd has gathered. An organizer singles you out\u003cbr\u003eand says:","Can you walk across the slackline for a bit?",-30.0,20.0],["You are traveling abroad with a friend who does not\u003cbr\u003espeak Mandarin. You run into a vendor on the street.\u003cbr\u003eYour friend turns to you and says:","Can you talk to this person in Mandarin by any chance?",0.0,30.0],["You are hanging out with a friend at home. Your friend\u003cbr\u003esuddenly says:","Can you hold your breath for seven minutes?",-40.0,0.0],["You go to visit a friend who's been arrested and is\u003cbr\u003ewaiting for their hearing. Through the glass they tell\u003cbr\u003eyou there's some stuff at their place that prosecutors\u003cbr\u003ecould find if they search it. They look at you and ask:","Can you grab the stuff in my apartment that could be\u003cbr\u003eused against me and get rid of it?",10.0,80.0],["A person from your recreational sports league explains\u003cbr\u003ethey are short on rent and won't receive their tax\u003cbr\u003erefund for another month. After only a few months of\u003cbr\u003eknowing each other, they look at you and say:","Can you loan me $5,000 until I get my tax refund next\u003cbr\u003emonth?",-10.0,60.0],["You are at a large company event disussing the new\u003cbr\u003eproduct launch. Your manager suddenly puts you on the\u003cbr\u003espot and says:","Can you give say some words about ?",-10.0,70.0],["Someone collapses at a rural rest stop and needs urgent\u003cbr\u003emedical care. The nearest ambulance is over an hour\u003cbr\u003eaway, nobody can find the car keys, and no one has a\u003cbr\u003eworking phone. A stranger looks at you and says:","Can you hot-wire this car so we can get them to the\u003cbr\u003ehospital in time?",-40.0,20.0],["A close friend's car needs new brake pads and they've\u003cbr\u003ewatched a tutorial but are nervous doing it alone. They\u003cbr\u003eask if you'll come over and help them work through it:","Can you help me change the brake pads on my car?",-50.0,60.0],["You are out on a cruise when a storm rolls in\u003cbr\u003eunexpectedly. There is no cell signal and the GPS has\u003cbr\u003edied. Someone finds a nautical chart in the cabin but\u003cbr\u003enone of the crew know how to read it. A panicked crew\u003cbr\u003emember turns to you and asks:","Can you use this to get us back to shore before the\u003cbr\u003estorm hits?",10.0,30.0],["A friend who runs a small restaurant asks for your help\u003cbr\u003eonline. You honestly didn't think the food was that\u003cbr\u003egreat when you went there. They message you:","Can you leave a bunch of five-star reviews for me\u003cbr\u003eonline?",-10.0,80.0],["You get a message from someone you know as your best\u003cbr\u003efriend's ex. They dated for about a year before she\u003cbr\u003eended it because he wouldn't stop showing up places she\u003cbr\u003ewas, and there was eventually a restraining order. Now\u003cbr\u003ehe's messaging you from what looks like a new account,\u003cbr\u003esaying he just wants to make sure she's okay. He asks:","Can you tell me where she's living these days?",-40.0,0.0],["You are at a friend's house and they have a pottery\u003cbr\u003ewheel they just got. They want to film someone using it\u003cbr\u003efor their social media. You once took a single\u003cbr\u003ebeginner's class. They point to the wheel and say:","Can you throw a centered vase on the wheel for the\u003cbr\u003evideo?",0.0,20.0],["Your close friend has a sudden emergency appointment\u003cbr\u003eand no childcare. They rush over and say:","Can you watch my kids for an hour while I go to this\u003cbr\u003eappointment?",-40.0,80.0],["A close friend desperately needs a haircut and can't\u003cbr\u003eget an appointment in time. They know you've cut your\u003cbr\u003eown hair before and say:","Can you give me a quick trim?",20.0,30.0],["A friend who is getting married calls the night before:\u003cbr\u003ethe musician they hired had an emergency cancellation.\u003cbr\u003eThey know you played some string instruments as a kid\u003cbr\u003eand say:","Can you perform a cello solo at my wedding ceremony\u003cbr\u003etomorrow?",-60.0,20.0],["You're at dinner and the conversation drifts to bucket\u003cbr\u003elist stuff. Everyone is going around sharing their\u003cbr\u003ecrazy goals. One of them looks at you and asks:","Can you climb Mount Everest with me?",-40.0,0.0],["A friend runs an open mic night and has an unexpected\u003cbr\u003eslot open up. They think it would be funny if you\u003cbr\u003efilled it. They say:","Can you do a stand-up comedy set at my open mic\u003cbr\u003etonight?",20.0,0.0],["You are on a hiking trail when a hiker trips and lands\u003cbr\u003ebadly, unable to bear weight on their leg. The group\u003cbr\u003eagrees it looks broken and they need to be carried out.\u003cbr\u003eSomeone turns to you and says:","Can you help improvise a splint so we can move them?",-20.0,60.0],["You and friends are hiking in a remote area when the\u003cbr\u003eGPS dies and you realize you've drifted way off trail.\u003cbr\u003eNo one knows exactly where you are, there's no cell\u003cbr\u003eservice, and daylight is fading. Your friend turns to\u003cbr\u003eyou and says:","Can you navigate us back to the trailhead?",-30.0,30.0],["You are sitting at a restaurant with a friend. Out of\u003cbr\u003ethe blue, your friend says:","Can you run 50 miles without stopping?",-30.0,0.0],["A distant relative of yours calls you in a panic,\u003cbr\u003esaying the police are asking where they were last night\u003cbr\u003eand they need an alibi. Your relative says:","Can you tell the police you were with me last night\u003cbr\u003eeven though you weren't?",-40.0,20.0],["A close friend has been stuck in bed with the flu for\u003cbr\u003eseveral days and hasn't been able to cook. They text\u003cbr\u003eyou saying they haven't eaten much, and then add:","Can you bring me a home-cooked meal?",-30.0,90.0],["You are at a large company event. Your manager suddenly\u003cbr\u003eputs you on the spot and says:","Can you give a speech in front of everyone right now?",20.0,0.0],["You are attending a local dance studio open house where\u003cbr\u003ethey need an audience volunteer to demonstrate a waltz\u003cbr\u003eroutine with an instructor. A staff member spots you\u003cbr\u003estanding near the dance floor and says:","Can you be our volunteer for the waltz demonstration?",10.0,0.0],["You go to visit a friend who's been arrested and is\u003cbr\u003ewaiting for their hearing. Through the glass they tell\u003cbr\u003eyou there's some stuff at their place that prosecutors\u003cbr\u003ecould find if they search it. They look at you and ask:","Can you grab the stuff in my apartment that could be\u003cbr\u003eused against me and get rid of it?",20.0,0.0],["You're walking down the sidewalk with a friend and come\u003cbr\u003eacross a squirrel that's been hit by a car. It's\u003cbr\u003eclearly badly hurt and suffering. Your friend can't\u003cbr\u003ebring themselves to do it and looks at you:","Can you step on it to put it out of its misery?",20.0,0.0],["Your friend's car has broken down on the side of the\u003cbr\u003eroad. Your friend turns to you and says:","Can you fix the engine on this car?",60.0,10.0],["A close friend is getting married and asks if you'd\u003cbr\u003ecompose and perform an original piece for their\u003cbr\u003eceremony. They know you play a little music and say:","Can you write and perform a song at my wedding\u003cbr\u003eceremony?",-10.0,10.0],["A close friend lost their mother and needs to deliver a\u003cbr\u003eeulogy. They're trying to prepare and reach out to you:","Can you help me practice the speech I have to give at\u003cbr\u003emy mom's memorial?",-50.0,100.0],["You are walking by a lake on a very cold winter day\u003cbr\u003ewith a friend. Your friend grins and says:","Can you jump into the lake right now?",0.0,70.0],["You are at a karaoke bar with friends when someone\u003cbr\u003edares the group to show off a skill. Your friends have\u003cbr\u003evoted you to do a beatbox solo in front of the whole\u003cbr\u003ebar. The host holds out the mic and says:","Can you do a beatbox solo for the crowd?",0.0,20.0],["A close friend confides they've been struggling and\u003cbr\u003ewants professional support but doesn't know where to\u003cbr\u003estart. They look at you and say:","Can you help me find a good therapist to start seeing?",-20.0,60.0],["You are at a friend's house and there is a piano in the\u003cbr\u003eroom. Your friend points to it and says:","Can you play something on the piano from memory?",-60.0,10.0],["A friend is performing in an improv comedy night and\u003cbr\u003eknows you find improv a bit tedious. They text you\u003cbr\u003eanyway:","Can you come to my improv show even though you're not\u003cbr\u003einto improv?",40.0,60.0],["You are at a friend's house and they have a pottery\u003cbr\u003ewheel they just got. They want to film someone using it\u003cbr\u003efor their social media. You once took a single\u003cbr\u003ebeginner's class. They point to the wheel and say:","Can you throw a centered vase on the wheel for the\u003cbr\u003evideo?",-70.0,80.0],["You are sitting at a restaurant with a friend. Out of\u003cbr\u003ethe blue, your friend says:","Can you run 50 miles without stopping?",50.0,0.0],["A coworker you barely know asks you the evening before\u003cbr\u003etheir shift. They text you:","Can you cover my shift tomorrow morning?",60.0,30.0],["You are coming home late when a traveler stops you\u003cbr\u003eoutside your building, explaining that every nearby\u003cbr\u003ehotel is full and their next bus isn't until morning.\u003cbr\u003eThey look desperate and say:","Can you let me stay in your apartment for one night?",0.0,70
